spring:
  jpa:
    hibernate:
      # 开发环境：自动更新表结构（根据实体类）
      # update: 启动时检查实体类，自动创建缺失的表，更新现有表的列
      # 注意：不会删除表或列，只会添加和修改
      ddl-auto: update
    # 开发环境显示 SQL 便于调试
    show-sql: true

logging:
  level:
    # 开发环境显示更多 Hibernate 调试信息
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.tool.schema: DEBUG
