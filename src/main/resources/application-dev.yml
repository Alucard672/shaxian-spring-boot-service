spring:
  jpa:
    hibernate:
      # 开发环境：自动更新表结构（根据实体类）
      # update: 启动时检查实体类，自动创建缺失的表，更新现有表的列
      # 注意：不会删除表或列，只会添加和修改
      ddl-auto: update
    # 开发环境显示 SQL 便于调试
    show-sql: true
  datasource:
    password: 123456
  # Redis配置
  redis:
    host: 127.0.0.1
    port: 6379
    # 密码
    password: 123456
    # 数据库索引（默认为0）
    database: 0
    # 连接超时时间
    timeout: 2000ms
    # 连接池配置
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 8
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池中的最小空闲连接
        min-idle: 0

# 会话配置
crm:
  # 会话超时时间（秒），默认2小时
  session:
    timeout: 7200
    # 是否使用Redis存储会话，默认为false（使用本地内存Map）
    use-redis: true

biz:
  # 会话超时时间（秒），默认2小时
  session:
    timeout: 7200
    # 是否使用Redis存储会话，默认为true（使用Redis）
    use-redis: true

logging:
  level:
    # 开发环境显示更多 Hibernate 调试信息
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.tool.schema: DEBUG
