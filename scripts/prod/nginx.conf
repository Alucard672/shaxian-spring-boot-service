# ================================================================
# Nginx 生产环境配置 - 纱线ERP系统
# 域名: jiyizhiyun.com
# SSL: Let's Encrypt (certbot 自动管理)
#
# 说明:
#   服务器上的实际配置由 certbot 自动生成并维护，
#   位于 /etc/nginx/conf.d/shaxian-prod.conf
#   此文件为参考模板，修改后需手动同步到服务器。
# ================================================================

# HTTP -> HTTPS 重定向 (certbot 自动配置)
server {
    listen 80;
    server_name jiyizhiyun.com www.jiyizhiyun.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name jiyizhiyun.com www.jiyizhiyun.com;

    # ---- SSL 证书 (Let's Encrypt / certbot 自动管理) ----
    ssl_certificate     /etc/letsencrypt/live/jiyizhiyun.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiyizhiyun.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- 前端静态文件 ----
    root /web/deploy/shaxian-sales;
    index index.html;

    # SPA 路由支持: 所有前端路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- 后端 API 反向代理 ----
    # 后端路由前缀为 /biz/，不是 /api/
    location /biz/ {
        proxy_pass http://127.0.0.1:8080/biz/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        client_max_body_size 20m;
    }

    # ---- 日志 ----
    access_log /var/log/nginx/shaxian-prod-access.log;
    error_log  /var/log/nginx/shaxian-prod-error.log;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
